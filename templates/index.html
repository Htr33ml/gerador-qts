<!DOCTYPE html>
<html>
<head>
    <title>Gerador de QTS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            padding-top: 50px;
        }

        .box {
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background-color: #2e7d32;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #1b5e20;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>Gerador de QTS</h2>

        <form method="POST" enctype="multipart/form-data">
            <label>Enviar DSI (PDF)</label>
            <input type="file" name="dsi" required>

            <label>Selecionar Companhia</label>
            <select name="companhia">
                <option value="1ª Cia">1ª Cia</option>
                <option value="2ª Cia">2ª Cia</option>
                <option value="3ª Cia">3ª Cia</option>
            </select>

            <button type="submit">Gerar QTS</button>
        </form>
    </div>

</body>
</html>
