<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gerador de QTS</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
}

.container{
width:750px;
margin:auto;
margin-top:40px;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:10px;
background:#2e7d32;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

.bloco{
border:1px solid #ddd;
padding:15px;
margin-bottom:20px;
border-radius:6px;
background:#fafafa;
}

.atividade{
border:1px solid #ddd;
padding:10px;
margin-top:10px;
border-radius:5px;
background:#ffffff;
}

</style>

<script>

function adicionarInstrucao(){

const container = document.getElementById("instrucoes")

const bloco = document.createElement("div")
bloco.className="atividade"

bloco.innerHTML=`

<label>Dia</label>
<select name="dia_instrucao">
<option value="SEGUNDA">Segunda</option>
<option value="TERÇA">Terça</option>
<option value="QUARTA">Quarta</option>
<option value="QUINTA">Quinta</option>
<option value="SEXTA">Sexta</option>
</select>

<label>Hora início</label>
<input type="text" name="hora_inicio">

<label>Hora fim</label>
<input type="text" name="hora_fim">

<label>Instruendo</label>
<input type="text" name="instruendo">

<label>Local</label>
<input type="text" name="local">

<label>Uniforme</label>
<input type="text" name="uniforme">

<label>Instrutor</label>
<input type="text" name="instrutor">

<label>Matéria</label>
<input type="text" name="materia">

<label>OII</label>
<input type="text" name="oii">

<label>Objetivo</label>
<input type="text" name="objetivo">

`

container.appendChild(bloco)

}

</script>

</head>

<body>

<div class="container">

<h2>Gerador de QTS</h2>

<form method="POST">

<div class="bloco">

<h3>Dados da Semana</h3>

<label>Semana de Instrução</label>
<input type="text" name="semana">

<label>Período</label>
<input type="text" name="periodo">

<label>Companhia</label>
<input type="text" name="companhia">

</div>


<div class="bloco">

<h3>Rotina Padrão</h3>

<label>
<input type="checkbox" name="tiragem_faltas">
Tiragem de faltas (08:00 - 08:15 todos os dias)
</label><br><br>

<label>
<input type="checkbox" name="tfm">
TFM (08:15 - 09:30 todos os dias)
</label><br><br>

<label>
<input type="checkbox" name="formatura_final">
Formatura de liberação (15:30 - 16:00 todos os dias)
</label>

</div>


<div class="bloco">

<h3>Sexta-feira</h3>

<label>
<input type="checkbox" name="sexta_pacote">
Sexta pacote completo
</label>

<p style="font-size:14px;color:#666">
Formatura 08:00–10:00<br>
Faxina 10:00–11:30<br>
Formatura final 11:30–12:00
</p>

</div>


<div class="bloco">

<h3>Dias sem expediente</h3>

<label><input type="checkbox" name="sem_expediente" value="SEGUNDA"> Segunda</label><br>
<label><input type="checkbox" name="sem_expediente" value="TERÇA"> Terça</label><br>
<label><input type="checkbox" name="sem_expediente" value="QUARTA"> Quarta</label><br>
<label><input type="checkbox" name="sem_expediente" value="QUINTA"> Quinta</label><br>
<label><input type="checkbox" name="sem_expediente" value="SEXTA"> Sexta</label>

</div>


<div class="bloco">

<h3>Instruções Específicas</h3>

<div id="instrucoes"></div>

<button type="button" onclick="adicionarInstrucao()">Adicionar Instrução</button>

</div>


<button type="submit">Gerar QTS</button>

</form>

</div>

</body>
</html>
